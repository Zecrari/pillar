name: Publish to PyPI

# Triggers:
#   • Every push to main → bump patch version and publish
#   • Manual trigger → choose bump type (patch / minor / major)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "scripts/**"
      - "tests/**"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    permissions:
      contents: write      # push version bump commit + tag
      id-token: write      # PyPI trusted publishing (no API token needed)

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build

      # ── 3. Bump version ────────────────────────────────────────────
      - name: Bump version
        id: bump
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          python scripts/bump_version.py --$BUMP
          echo "new_version=$(cat version.txt)" >> $GITHUB_OUTPUT

      # ── 4. Commit version bump back to main ────────────────────────
      - name: Commit and tag version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml pillar/__init__.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags

      # ── 5. Build distribution ──────────────────────────────────────
      - name: Build package
        run: python -m build

      # ── 6. Publish to PyPI (trusted publishing — no token) ─────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # ── 7. Create GitHub Release ───────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new_version }}"
          name: "v${{ steps.bump.outputs.new_version }}"
          generate_release_notes: true
          files: dist/*
